<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Daily Roast</title>
    <style>
        :root { --primary: #4b3621; --secondary: #c8a27c; --light: #fdfaf5; --dark: #1a120b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--light); }
        nav { background: white; padding: 1rem 8%; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-decoration: none; }
        .nav-links { list-style: none; display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--dark); }

        .contact-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transform: translateY(50px); opacity: 0; transition: 0.8s; }
        .reveal { transform: translateY(0); opacity: 1; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--secondary); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--secondary); letter-spacing: 2px; }
        footer { background: var(--dark); color: white; text-align: center; padding: 2rem; margin-top: 50px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Daily Roast</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container fade-in">
        <h2 style="text-align: center; color: var(--primary);">Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="button">Send Message</button>
        </form>
    </div>

    <footer>&copy; 2026 Daily Roast Cafe</footer>

    <script>
        window.onload = () => document.querySelector('.fade-in').classList.add('reveal');
    </script>
</body>
</html>
